name: Weekly Discord Role Cleanup

on:
  schedule:
    # Every Monday at 12:05 AM Philippines time
    - cron: "5 0 * * 1"
      timezone: "Asia/Manila"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only check members; do not remove the role"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  remove-role:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Remove Discord role
        run: python remove_role.py
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_ROLE_IDS: ${{ secrets.DISCORD_ROLE_IDS }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SKIP_BOTS: "true"
